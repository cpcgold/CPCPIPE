<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#101612"><title>CPC Dynasty Mobile</title><style>
:root{--w:#fafaf8;--g:#1e4d36;--p:#f0468c;--b:#1f3a57;--c:#5fa0d6;--s:#789377;--k:#111713}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--k);color:var(--w);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}button{font:inherit}#app{min-height:100dvh;display:grid;grid-template-rows:auto minmax(330px,52vh) auto}.top{padding:calc(10px + env(safe-area-inset-top)) 14px 10px;display:flex;justify-content:space-between;align-items:center;background:#0c110e;border-bottom:1px solid #ffffff26}.brand{display:flex;gap:10px;align-items:center}.logo{width:38px;height:38px;border:2px solid var(--w);border-radius:50%;display:grid;place-items:center;color:var(--p);font-weight:900;font-size:12px}.brand b{display:block;letter-spacing:.08em}.brand small{display:block;color:#ffffff8f;font-size:9px;letter-spacing:.13em}.top button{min-height:42px;border:1px solid #ffffff2e;border-radius:10px;background:#ffffff0e;color:white;font-size:11px;font-weight:800}.world{position:relative;overflow:hidden;background:linear-gradient(#8d86a8,#e3a1ae 55%,#f79c94);transition:.7s}.world.night{background:linear-gradient(#171825,#292a42 65%,#493342)}.hill{position:absolute;left:-5%;right:-5%;bottom:43%;height:32%;background:#485f3c;clip-path:polygon(0 70%,12% 40%,27% 67%,43% 29%,58% 60%,75% 22%,100% 54%,100% 100%,0 100%)}.night .hill{background:#17231c}.ground{position:absolute;inset:57% 0 0;background:#c9c2b2}.night .ground{background:#595856}.tree{position:absolute;bottom:42%;width:18px;height:140px;background:#193b24;border-radius:60% 60% 40% 40%}.t1{left:7%}.t2{left:18%;height:110px}.t3{right:16%;height:155px}.t4{right:5%;height:120px}.scene{position:absolute;inset:0}.card{position:absolute;left:12px;right:12px;bottom:14px;padding:14px;background:#0e1512d9;border:1px solid #ffffff36;border-radius:16px;box-shadow:0 18px 50px #0007;backdrop-filter:blur(10px)}.card small{color:#ffffff9a;letter-spacing:.16em;font-size:9px;font-weight:900}.card h1{margin:4px 0 5px;font-size:clamp(24px,7vw,38px);line-height:.95}.card p{margin:0;color:#ffffffcf;font-size:13px;line-height:1.4}.sign{position:absolute;left:50%;top:34%;transform:translate(-50%,-50%);width:min(76%,330px);padding:18px 10px;background:#f4f3ed;color:#171717;border:8px solid #f4f3ed;outline:3px solid #171717;text-align:center;font-weight:900;letter-spacing:.1em}.sign span{display:block;font-size:9px;margin-top:7px;letter-spacing:.14em}.road{position:absolute;left:28%;right:28%;top:27%;bottom:0;background:#34373a;clip-path:polygon(43% 0,57% 0,100% 100%,0 100%)}.parking{position:absolute;left:8%;right:8%;top:43%;bottom:-15%;background:repeating-linear-gradient(90deg,#34363a 0 10%,#e9e9df 10.5% 11%,#34363a 11.5% 22%);transform:perspective(300px) rotateX(43deg)}.stairs{position:absolute;left:29%;right:29%;top:23%;bottom:-10%;background:repeating-linear-gradient(#eee 0 14px,#bbb 15px 18px);border-left:5px solid #111;border-right:5px solid #111;transform:perspective(360px) rotateX(54deg)}.desk{position:absolute;left:18%;right:18%;top:31%;height:150px;background:#f0f1ec;border:12px solid #f0f1ec;box-shadow:0 20px 45px #0006}.desk:before{content:"";position:absolute;left:-25px;right:-25px;top:-42px;height:44px;background:#202020;clip-path:polygon(12% 100%,20% 10%,80% 10%,88% 100%)}.desk:after{content:"FRONT DESK";position:absolute;left:15%;right:15%;bottom:12px;padding:12px;background:#15241d;color:white;text-align:center;font-weight:900;letter-spacing:.13em}.board{position:absolute;left:10%;right:10%;top:26%;padding:16px;background:#111813;border:8px solid #efefe8;text-align:center}.board b{letter-spacing:.18em}.lights{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}.lights i{height:58px;background:#1d4c35;border-radius:7px;display:grid;place-items:center;font-style:normal;font-size:9px;font-weight:900}.lights i:nth-child(2){background:#594a1c}.lights i:nth-child(3){background:#55232b}.court{position:absolute;left:10%;right:10%;top:29%;bottom:3%;background:linear-gradient(#5fa0d6 33%,#1f3a57 33% 67%,#5fa0d6 67%);border:14px solid #789377;transform:perspective(440px) rotateX(54deg);box-shadow:0 22px 50px #0006}.court:after{content:"";position:absolute;left:0;right:0;top:49%;height:5px;background:white;box-shadow:0 5px #111}.pit{position:absolute;left:13%;top:34%;width:100px;height:45px;border-radius:50%;background:radial-gradient(ellipse,#ffb151 0 18%,#672817 20% 42%,#222 44% 72%,#111 73%);box-shadow:0 0 30px #ff853c66}.chair{position:absolute;width:48px;height:54px;background:#b9ae9c;clip-path:polygon(10% 0,90% 0,80% 62%,100% 100%,72% 100%,55% 67%,42% 67%,25% 100%,0 100%,20% 62%)}.c1{left:7%;top:52%}.c2{left:35%;top:32%}.c3{right:18%;top:51%}.stable{position:absolute;left:3%;right:3%;top:27%;height:70px;background:repeating-linear-gradient(90deg,#f4f3ec 0 8%,#17231d 8% 11%,#f4f3ec 11% 17%)}.lawn{position:absolute;left:5%;right:5%;top:36%;bottom:4%;border-radius:50%/18%;background:#4e8a45;box-shadow:inset 0 0 0 9px #f4f3ec,0 20px 50px #0005}.dog{position:absolute;left:12%;bottom:24%;width:44px;height:24px;border-radius:50%;background:#d5a457;animation:walk 7s linear infinite alternate}.dog:after{content:"";position:absolute;right:-8px;top:-3px;width:16px;height:16px;border-radius:50%;background:#d5a457}@keyframes walk{to{transform:translateX(58vw)}}.lower{padding:12px 12px calc(14px + env(safe-area-inset-bottom));display:grid;gap:9px}.status{display:flex;justify-content:space-between;gap:8px}.status small{display:block;color:#ffffff80;font-size:9px;letter-spacing:.13em}.status strong{font-size:13px}.pills{display:flex;gap:6px}.pill{font-size:9px;font-weight:900;border:1px solid #ffffff2b;padding:6px 8px;border-radius:99px}.actions{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.action{min-height:52px;border:1px solid #ffffff29;border-radius:12px;background:var(--g);color:white;text-align:left;padding:10px;font-weight:900}.action span{display:block;font-size:8px;color:#ffffffa0;letter-spacing:.12em;margin-bottom:3px}.action.alt{background:#ffffff0d}.action.pink{background:#a63066}.action:disabled{opacity:.35}.feed{border-left:3px solid var(--p);background:#ffffff0b;padding:9px 10px;min-height:43px;font-size:12px;line-height:1.35;color:#ffffffd2}.modal{position:fixed;inset:0;z-index:10;display:none;align-items:end;padding:12px;background:#030605bb;backdrop-filter:blur(8px)}.modal.open{display:flex}.sheet{width:min(100%,620px);max-height:90dvh;overflow:auto;margin:auto;background:#151c18;border:1px solid #ffffff35;border-radius:20px;padding:17px;box-shadow:0 -20px 60px #0008}.close{float:right;width:42px;height:42px;border-radius:50%;border:1px solid #ffffff2c;background:#ffffff0d;color:white;font-size:20px}.sheet h2{font-size:25px;margin:2px 0 7px}.sheet p{color:#ffffffbd;font-size:13px;line-height:1.45}.choices{display:grid;gap:8px;margin-top:12px}.choice{padding:12px;border:1px solid #ffffff2b;border-radius:11px;background:#ffffff0c;color:white;text-align:left;font-weight:800}.choice small{display:block;color:#ffffff85;margin-top:4px;font-weight:400}.score{display:flex;justify-content:center;align-items:center;gap:18px;margin:12px 0;padding:12px;border:1px solid #ffffff2b;border-radius:12px}.score div{text-align:center}.score small{display:block;font-size:8px;color:#ffffff80}.score b{font-size:38px}.shots{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.shot{min-height:68px;border:1px solid #ffffff2b;border-radius:12px;background:#1e4d36;color:white;font-weight:900}.shot:nth-child(2){background:#1f3a57}.shot:nth-child(3){background:#783354}.rally{margin:10px 0;padding:9px;border-left:3px solid var(--c);background:#ffffff0b;min-height:50px;font-size:12px;line-height:1.4}.wide{width:100%;min-height:50px;border:0;border-radius:12px;background:var(--p);color:white;font-weight:900}@media(min-width:850px){#app{grid-template-columns:1.4fr .6fr;grid-template-rows:auto 1fr}.top{grid-column:1/-1}.world,.lower{min-height:calc(100dvh - 61px)}.actions{grid-template-columns:1fr}}
</style></head><body><div id="app"><header class="top"><div class="brand"><div class="logo">CPC</div><div><b>CPC DYNASTY</b><small>THE CLUB IS THE GAME</small></div></div><button id="menu">MENU</button></header><main id="world" class="world"><i class="hill"></i><i class="ground"></i><i class="tree t1"></i><i class="tree t2"></i><i class="tree t3"></i><i class="tree t4"></i><div id="visual" class="scene"></div><section class="card"><small id="kicker">FIRST VISIT - GOLDEN HOUR</small><h1 id="title">The Gate</h1><p id="text">The club begins before the courts. Distant ball pops carry down the canyon.</p></section></main><section class="lower"><div class="status"><div><small>CURRENT CLUB BEAT</small><strong id="objective">Enter like a member.</strong></div><div class="pills"><span id="rating" class="pill">2.00</span><span id="rep" class="pill">REP 0</span></div></div><div id="actions" class="actions"></div><div id="feed" class="feed">This version uses plain HTML. No WebGL, install, or external files.</div></section></div><div id="modal" class="modal"><div id="sheet" class="sheet"></div></div><script>
(function(){"use strict";var K="cpc-dynasty-mobile-1",S=["gate","driveway","parking","stairs","checkin","valet","court8","firepit","lawn"],D={gate:["FIRST VISIT - GOLDEN HOUR","The Gate","The club begins before the courts. Distant ball pops carry down the canyon.","Enter like a member."],driveway:["ARRIVAL - TREE TUNNEL","The Driveway","White ranch fencing, eucalyptus, and a road that makes the property feel discovered.","Follow the road to member parking."],parking:["ARRIVAL - EAST EDGE","Member Parking","The courts are still hidden above rosemary. The staircase is the threshold.","Find the grand staircase."],stairs:["ARRIVAL - THE REVEAL","The Grand Staircase","Every step adds ball pops, shoe squeaks, and somebody yelling OHHH.","Climb toward CHECK IN / THE SHOPPE."],checkin:["FRONT DESK - PHYSICAL HUB","Check In","No dashboard. Walk up to the real desk and let the club day begin.","Check in with the Front Desk Sage."],valet:["COURT VALET - VIBE MATCHING","Get Matched","Rating matters. Vibe matters more.","Choose a vibe and receive a court assignment."],court8:["SHOWCASE COURT - OPEN SIGHTLINE","Court 8","Blue-on-blue acrylic, sage apron, black fencing, pergola, gravel, firepit, one orange cone.","Play the assigned match."],firepit:["CLUB LIFE - DRAMA EVENT","The Firepit","The match ends, but the game does not. Court 7 has become your problem.","Resolve the Court 7 Cold War."],lawn:["CLUB DAY - NIGHT","The Great Lawn","The old stable ring opens into green space while cool court light spills from the south.","Let the club day breathe."]};var Z={i:0,started:false,check:false,vibe:"",opp:"",rep:0,rating:2,match:false,drama:false,you:0,them:0};var st=load(),w=q("world"),v=q("visual"),a=q("actions"),f=q("feed"),m=q("modal"),sh=q("sheet");function q(x){return document.getElementById(x)}function load(){try{return Object.assign({},Z,JSON.parse(localStorage.getItem(K)||"{}"))}catch(e){return Object.assign({},Z)}}function save(){try{localStorage.setItem(K,JSON.stringify(st))}catch(e){}}function esc(x){return String(x).replace(/[&<>\"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]})}function btn(t,s,fn,c,d){var b=document.createElement("button");b.className="action "+(c||"");b.disabled=!!d;b.innerHTML="<span>"+esc(s)+"</span>"+esc(t);b.onclick=fn;return b}function say(x){f.textContent=x}function go(i,x){st.i=i;if(i>5)w.className="world night";say(x);render()}function art(id){return id==="gate"?'<div class="sign">CALABASAS PICKLEBALL<span>ACADEMY &amp; COUNTRY CLUB</span></div>':id==="driveway"?'<div class="road"></div>':id==="parking"?'<div class="parking"></div>':id==="stairs"?'<div class="stairs"></div>':id==="checkin"?'<div class="desk"></div>':id==="valet"?'<div class="board"><b>COURT VALET</b><div class="lights"><i>READY NOW</i><i>FINISHING</i><i>SMOOTHIE BAR</i></div></div>':id==="court8"?'<div class="court"></div>':id==="firepit"?'<div class="pit"></div><i class="chair c1"></i><i class="chair c2"></i><i class="chair c3"></i>':'<div class="stable"></div><div class="lawn"></div><div class="dog"></div>'}function render(){var id=S[st.i],d=D[id];q("kicker").textContent=d[0];q("title").textContent=d[1];q("text").textContent=d[2];q("objective").textContent=d[3];q("rating").textContent="RATING "+st.rating.toFixed(2);q("rep").textContent="REP "+st.rep;v.innerHTML=art(id);a.innerHTML="";if(!st.started){a.appendChild(btn("Begin Arrival","MOBILE SAFE",function(){st.started=true;say("The gate opens. The club is mostly sound at first.");render()},"pink"));return}if(id==="gate")a.appendChild(btn("Walk Through the Gate","ARRIVAL",function(){go(1,"The trees close over the road.")},"pink"));if(id==="driveway"){a.appendChild(btn("Continue Up the Drive","TO PARKING",function(){go(2,"Barn lights and reserved stalls appear ahead.")}));a.appendChild(btn("Return to Gate","WALK SOUTH",function(){go(0,"The white ranch fence comes back into view.")},"alt"))}if(id==="parking"){a.appendChild(btn("Find the Staircase","COURTS ABOVE",function(){go(3,"The courts are just out of sight.")}));a.appendChild(btn("Listen","PRESENCE CHECK",function(){say("POP... POP-POP... squeak... OHHH. You hear the club before you see it.")},"alt"))}if(id==="stairs")a.appendChild(btn("Climb the Staircase","MAIN THRESHOLD",function(){go(4,"CHECK IN / THE SHOPPE appears at the top.")},"pink"));if(id==="checkin"){a.appendChild(btn(st.check?"Checked In":"Check In","FRONT DESK",function(){st.check=true;st.rep++;say("Front Desk Sage: Court Valet is north. Avoid Equipment Guy until you warm up. +1 Rep.");render()},"pink",st.check));a.appendChild(btn("Walk to Court Valet","PHYSICAL LOCATION",function(){go(5,"The Green Light Board glows beside the court corridor.")},"",!st.check))}if(id==="valet"){a.appendChild(btn(st.opp?"Assignment Ready":"Choose Your Vibe","COURT VALET",valet,"pink"));a.appendChild(btn("Walk to Court 8","SHOWCASE COURT",function(){go(6,"Your opponent is already pretending not to stretch.")},"",!st.opp))}if(id==="court8"){a.appendChild(btn(st.match?"Match Complete":"Start Court 8 Match",st.opp||"NEED ASSIGNMENT",match,"pink",st.match||!st.opp));a.appendChild(btn("Visit the Firepit","RETURN TO CLUB LIFE",function(){go(7,"Two groups immediately ask you to mediate Court 7.")},"",!st.match))}if(id==="firepit"){a.appendChild(btn(st.drama?"Drama Resolved":"Mediate Court 7","FIREPIT DRAMA",drama,"pink",st.drama));a.appendChild(btn("Walk to Great Lawn","END CLUB DAY",function(){go(8,"Night settles over the stable ring.")},"",!st.drama))}if(id==="lawn"){a.appendChild(btn("View Club Day Recap","CAREER PROGRESS",recap,"pink"));a.appendChild(btn("Find Dallas","CLUB DOG",function(){st.rep++;say("Dallas returns one ball and steals another. +1 Rep.");render()},"alt"))}save()}function open(x){sh.innerHTML=x;m.className="modal open"}function close(){m.className="modal";render()}m.onclick=function(e){if(e.target===m)close()};function valet(){open('<button class="close" id="x">x</button><h2>How do you want to play?</h2><p>Rating gets you close. Vibe keeps the game from becoming a hostage situation.</p><div class="choices"><button class="choice" data-v="Social">Social<small>Good points, good chatter.</small></button><button class="choice" data-v="Competitive">Competitive<small>Every line call develops case law.</small></button><button class="choice" data-v="Chaotic">Chaotic<small>Lobs and improbable confidence.</small></button></div>');q("x").onclick=close;sh.querySelectorAll("[data-v]").forEach(function(b){b.onclick=function(){var x=b.dataset.v,p=x==="Social"?["Sunscreen Oracle","Cardio Couple"]:x==="Competitive"?["Tennis Refugee","Kitchen Lawyer"]:["Lobber","Equipment Guy"];st.vibe=x;st.opp=p[Math.floor(Math.random()*p.length)];say("Court Valet: "+x+" match confirmed on Court 8 versus "+st.opp+".");close()}})}function match(){st.you=0;st.them=0;open('<button class="close" id="x">x</button><h2>You vs. '+esc(st.opp)+'</h2><p>First to 5. Pick the point pattern.</p><div class="score"><div><small>YOU</small><b id="ys">0</b></div><b>:</b><div><small>THEM</small><b id="ts">0</b></div></div><div id="r" class="rally">Court 8 settles. The firepit crowd pretends not to watch.</div><div class="shots"><button class="shot" data-s="dink">DINK</button><button class="shot" data-s="drive">DRIVE</button><button class="shot" data-s="lob">LOB</button></div>');q("x").onclick=close;sh.querySelectorAll("[data-s]").forEach(function(b){b.onclick=function(){point(b.dataset.s)}})}function point(s){var chance=s==="dink"?.64:s==="drive"?.53:.46,win=Math.random()<chance;if(win)st.you++;else st.them++;q("ys").textContent=st.you;q("ts").textContent=st.them;var good={dink:"Soft reset. Your opponent blinks first.",drive:"Clean through the middle.",lob:"The lob lands after a full change of seasons."},bad={dink:"The net accepts your donation.",drive:"The fence appreciates the pace.",lob:"The lob requests FAA clearance."};q("r").textContent=win?good[s]:bad[s];if((st.you>=5||st.them>=5)&&Math.abs(st.you-st.them)>=2||st.you>=7||st.them>=7){st.match=true;var won=st.you>st.them;st.rep+=won?3:1;st.rating+=won?.08:.02;q("r").textContent=(won?"You win. ":"You lose. ")+(won?"Court Valet: You stood at the kitchen like it was rent-controlled.":"Court Valet: Your comeback begins now. I ran the numbers.");sh.querySelectorAll(".shot").forEach(function(b){b.disabled=true});var n=document.createElement("button");n.className="wide";n.textContent="Return to the Club";n.onclick=function(){say(q("r").textContent);close()};sh.appendChild(n)}}function drama(){open('<button class="close" id="x">x</button><h2>Everybody owns Court 7 forever.</h2><p>Two standing groups claim an ancient right to 9 AM.</p><div class="choices"><button class="choice" data-r="3">Rotate the schedule<small>Reasonable. Suspiciously reasonable.</small></button><button class="choice" data-r="2">Ask Court Valet<small>Both groups are tagged Territorial.</small></button><button class="choice" data-r="1">Reserve Court 8 and back away<small>Cowardly, efficient, club-coded.</small></button></div>');q("x").onclick=close;sh.querySelectorAll("[data-r]").forEach(function(b){b.onclick=function(){st.rep+=Number(b.dataset.r);st.drama=true;say("Court 7 Cold War resolved. +"+b.dataset.r+" Rep.");close()}})}function recap(){open('<button class="close" id="x">x</button><h2>You did not just select a match.</h2><p>You entered, climbed, checked in, got matched, played, returned to club life, and watched the grounds become night.</p><div class="score"><div><small>RATING</small><b>'+st.rating.toFixed(2)+'</b></div><div><small>REP</small><b>'+st.rep+'</b></div></div><button class="wide" id="again">Start Another Club Day</button>');q("x").onclick=close;q("again").onclick=function(){var rep=st.rep,r=st.rating;st=Object.assign({},Z,{started:true,rep:rep,rating:r});w.className="world";close();say("A new golden-hour club day begins at the gate.")}}q("menu").onclick=function(){open('<button class="close" id="x">x</button><h2>Club Menu</h2><div class="choices"><button id="reset" class="choice">Reset local save<small>Starts at the gate.</small></button></div>');q("x").onclick=close;q("reset").onclick=function(){localStorage.removeItem(K);st=Object.assign({},Z);w.className="world";close();say("Save reset. The gate is waiting.")}};render()})();
</script></body></html>
